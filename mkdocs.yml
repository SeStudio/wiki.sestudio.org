site_name: SeStudio Wiki
site_url: https://wiki.sestudio.org/
docs_dir: docs
theme:
  name: material
plugins:
  - search
  - roamlinks
markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
